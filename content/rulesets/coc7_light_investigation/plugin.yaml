    keywords: [research, archive, books, records, 资料, 档案, 图书馆, 记录]
  listen:
    label: Listen
    kind: skill
    source: listen
    default: 45
    procedure_id: skill_check
    keywords: [listen, sound, hear, 聆听, 声音, 听]
  psychology:
    label: Psychology
    kind: skill
    source: psychology
    default: 40
    procedure_id: skill_check
    keywords: [read, motive, lie, 心理, 动机, 撒谎]
  stealth:
    label: Stealth
    kind: skill
    source: stealth
    default: 40
    procedure_id: opposed_check
    keywords: [sneak, hide, quietly, 潜行, 躲, 悄悄]
  persuade:
    label: Persuade
    kind: skill
    source: persuade
    default: 45
    procedure_id: skill_check
    keywords: [persuade, convince, calm, 说服, 劝, 安抚]
  mechanical_repair:
    label: Mechanical Repair
    kind: skill
    source: mechanical_repair
    default: 50
    procedure_id: skill_check
    keywords: [repair, machine, radio, beacon, 修理, 机械, 无线电, 灯塔]
  occult:
    label: Occult
    kind: skill
    source: occult
    default: 35
    procedure_id: skill_check
    keywords: [occult, ritual, symbol, 神秘, 仪式, 符号]
  first_aid:
    label: First Aid
    kind: skill
    source: first_aid
    default: 45
    procedure_id: skill_check
    keywords: [first aid, bandage, 急救, 包扎]
  int_check:
    label: Intelligence
    kind: attribute
    source: int
    default: 65
    procedure_id: attribute_check
    keywords: [deduce, logic, 推理, 分析]
  dex_check:
    label: Dexterity
    kind: attribute
    source: dex
    default: 55
    procedure_id: attribute_check
    keywords: [dodge, balance, 闪避, 平衡]
  luck:
    label: Luck
    kind: state
    source: luck
    default: 50
    procedure_id: luck_check
    keywords: [luck, chance, avoid, 幸运, 运气, 碰巧]
  sanity:
    label: Sanity
    kind: state
    source: sanity
    default: 55
    procedure_id: sanity_check
    keywords: [sanity, horror, unnatural, 理智, 恐怖, 异常]
result_bands:
  failure: The check fails; use only the established procedure failure effect.
  success: The check succeeds at regular level.
  hard_success: The check succeeds at hard level and may reveal a stronger but still authorized benefit.
  extreme_success: The check succeeds at extreme level and may reveal a precise clue or strong advantage.
  critical_success: The check is a critical success; reward clarity without skipping required mystery steps.
gm_constraints:
  - Never ask the player to roll manually.
  - Do not treat a pushed roll as free; failure must intensify an established cost.
  - Sanity pressure changes mood and pressure clocks, not durable madness labels unless a scenario authorizes them.
